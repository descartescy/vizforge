name: Publish vizforge to PyPI

# 触发条件：当你推送一个形如 "v1.0.0" 的 tag 时触发
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: windows-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 安装构建依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      # 4. 构建包 (生成 tar.gz 和 wheel)
      - name: Build package
        run: python -m build

      # 5. 发布到 PyPI
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
